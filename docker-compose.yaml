services:
  app:
    container_name: card-system-app
    image: ghcr.io/chaos-zhu/card-system-app:${IMAGE_TAG:-latest}
    env_file: ${ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/storage:/var/www/storage
    restart: unless-stopped

  web:
    container_name: card-system-web
    image: ghcr.io/chaos-zhu/card-system-web:${IMAGE_TAG:-latest}
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-8080}:80"
    restart: unless-stopped

  queue:
    container_name: card-system-queue
    image: ghcr.io/chaos-zhu/card-system-app:${IMAGE_TAG:-latest}
    env_file: ${ENV_FILE:-.env}
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/storage:/var/www/storage
    restart: unless-stopped

  scheduler:
    container_name: card-system-scheduler
    image: ghcr.io/chaos-zhu/card-system-app:${IMAGE_TAG:-latest}
    env_file: ${ENV_FILE:-.env}
    command: sh -c 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/storage:/var/www/storage
    restart: unless-stopped

  db:
    container_name: card-system-db
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    container_name: card-system-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
